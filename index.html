<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dart HLGEN Viewer</title>
    <style>
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        canvas {
            width: 100%;
            max-width: 700px;
            aspect-ratio: 1 / 1;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        .info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: rgba(255,255,255,0.3);
            font-family: monospace;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <canvas id="artCanvas" width="700" height="700"></canvas>
    <div class="info" id="tokenInfo">Loading...</div>
    
    <!-- Load engine from darthlgen-engine repository -->
    <script src="https://raw.githubusercontent.com/ivxxbeats/darthlgen-engine/main/sketch.js"></script>
    
    <script>
        // Simple viewer that uses the engine
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        
        // Get token data from URL
        const params = new URLSearchParams(window.location.search);
        const tokenId = params.get('tokenId') || '1';
        const txHash = params.get('txHash') || '0xabc123';
        const forceGrail = params.get('forceGrail') === 'true';
        
        // Build custom mint data
        let customMintData = null;
        if (forceGrail) {
            customMintData = JSON.stringify({ forceGrail: true, intensity: 0.8 });
        }
        
        // Render using the engine
        if (typeof renderCanonicalFrame === 'function') {
            const result = renderCanonicalFrame({
                tokenId: parseInt(tokenId),
                txHash: txHash,
                width: 320,
                height: 320,
                customMintData: customMintData,
                debugOptions: null
            });
            
            // Draw pixels to canvas
            const imgData = ctx.createImageData(700, 700);
            for (let y = 0; y < 700; y++) {
                for (let x = 0; x < 700; x++) {
                    const srcX = Math.floor(x * 320 / 700);
                    const srcY = Math.floor(y * 320 / 700);
                    const srcIdx = (srcY * 320 + srcX) * 4;
                    const dstIdx = (y * 700 + x) * 4;
                    imgData.data[dstIdx] = result.pixels[srcIdx];
                    imgData.data[dstIdx + 1] = result.pixels[srcIdx + 1];
                    imgData.data[dstIdx + 2] = result.pixels[srcIdx + 2];
                    imgData.data[dstIdx + 3] = 255;
                }
            }
            ctx.putImageData(imgData, 0, 0);
            
            document.getElementById('tokenInfo').innerHTML = `Token #${tokenId} | ${result.traits.engineType} | ${result.traits.rarityClass}`;
        } else {
            document.getElementById('tokenInfo').innerHTML = 'Error: Engine not loaded';
        }
    </script>
</body>
</html>
