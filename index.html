<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Art of Farcaster Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
        }
        
        canvas {
            width: 100%;
            height: auto;
            max-width: 700px;
            aspect-ratio: 1 / 1;
            display: block;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            border-radius: 8px;
        }
        
        @keyframes glow {
            0% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); }
            100% { filter: drop-shadow(0 0 20px rgba(255,255,255,0.2)); }
        }
        
        canvas {
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        .info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: rgba(255,255,255,0.3);
            font-family: monospace;
            font-size: 10px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="artCanvas" width="700" height="700"></canvas>
    </div>
    <div class="info" id="tokenInfo">Loading...</div>
    <script src="viewer.js"></script>
</body>
</html>
